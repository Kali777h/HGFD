<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anyy Bot - Cutie Verification</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- CSP for Telegram WebView -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://telegram.org; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com;">
    
    <style>
        :root {
            --primary-pink: #ffdde1;
            --secondary-pink: #ee9ca7;
            --accent-gold: #fbc2eb;
            --text-color: #6d4c41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary-pink) 0%, var(--secondary-pink) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            color: var(--text-color);
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #8d6e63;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .captcha-container {
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .status {
            margin: 20px 0;
            padding: 12px;
            border-radius: 15px;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .status.success { background: #d4edda; color: #155724; display: block; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; display: block; border: 1px solid #f5c6cb; }
        .status.loading { background: #fff3cd; color: #856404; display: block; border: 1px solid #ffeaa7; }

        .button {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4);
        }

        .button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 154, 158, 0.6);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.8; }
            100% { opacity: 0.6; }
        }

        .footer {
            margin-top: 25px;
            color: #a1887f;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🌸</div>
        <h1>ANYY CUTIE VERIFICATION</h1>
        <p class="subtitle">Verify that you're a human, cutie!<br>Just solve the CAPTCHA below to continue.</p>
        
        <div class="captcha-container">
            <div id="cf-turnstile"></div>
        </div>
        
        <div id="status" class="status"></div>
        
        <button id="verifyButton" class="button" disabled>
            Waiting for CAPTCHA...
        </button>
        
        <div class="footer">Securely powered by Cloudflare Turnstile</div>
    </div>

    <script>
        const TURNSTILE_SITE_KEY = "0x4AAAAAADDs1__2abwt1-ks98fIKXJBZvE";
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let turnstileWidgetId = null;
        let isVerified = false;
        
        function initTurnstile() {
            try {
                if (typeof turnstile === 'undefined') {
                    console.log('Waiting for turnstile SDK...');
                    return;
                }
                
                turnstileWidgetId = turnstile.render('#cf-turnstile', {
                    sitekey: TURNSTILE_SITE_KEY,
                    callback: function(token) {
                        onCaptchaSuccess(token);
                    },
                    'expired-callback': function() {
                        showStatus('CAPTCHA expired. Please solve again.', 'error');
                        document.getElementById('verifyButton').disabled = true;
                        document.getElementById('verifyButton').textContent = 'Waiting for CAPTCHA...';
                        isVerified = false;
                    },
                    'error-callback': function() {
                        showStatus('CAPTCHA error. Please refresh page.', 'error');
                    }
                });
                document.getElementById('verifyButton').textContent = 'Waiting for CAPTCHA...';
            } catch (e) {
                console.error('Render error:', e);
            }
        }
        
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
        
        function onCaptchaSuccess(token) {
            showStatus('Yay! You are verified, cutie! ✨', 'success');
            document.getElementById('verifyButton').disabled = false;
            document.getElementById('verifyButton').textContent = '✅ Send Verification to Bot';
            isVerified = true;
            window.cfToken = token;
        }
        
        async function sendVerification() {
            if (!isVerified || !window.cfToken) return;
            
            showStatus('Sending to bot...', 'loading');
            document.getElementById('verifyButton').disabled = true;
            document.getElementById('verifyButton').textContent = 'Sending...';
            
            try {
                const verificationData = {
                    action: "verify",
                    cf_token: window.cfToken,
                    timestamp: Date.now(),
                    user_id: tg.initDataUnsafe.user?.id || 'unknown'
                };
                tg.sendData(JSON.stringify(verificationData));
                showStatus('✅ Verified! You can close this window.', 'success');
                document.getElementById('verifyButton').textContent = '✅ Complete!';
                setTimeout(() => tg.close(), 2000);
            } catch (error) {
                showStatus('Error sending verification. Try again.', 'error');
                document.getElementById('verifyButton').disabled = false;
                document.getElementById('verifyButton').textContent = '✅ Send Verification to Bot';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                showStatus('Please open this in Telegram.', 'error');
                return;
            }
            
            // Polling for Turnstile SDK
            const checkInterval = setInterval(() => {
                if (typeof turnstile !== 'undefined') {
                    clearInterval(checkInterval);
                    initTurnstile();
                }
            }, 100);
            
            document.getElementById('verifyButton').addEventListener('click', sendVerification);
        });
    </script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
