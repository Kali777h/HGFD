<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANYY CUTIE VERIFICATION</title>
    
    <!-- Google Fonts for playful look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Cloudflare Turnstile CAPTCHA -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- CSP for Telegram WebView -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://telegram.org https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com;">
    
    <style>
        :root {
            --pastel-pink: #ffdde1;
            --deep-pink: #ee9ca7;
            --gold: #d4af37;
            --cream: #fffaf0;
            --text-pink: #d63384;
            --accent-gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--deep-pink) 100%);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        .container {
            max-width: 450px;
            width: 100%;
            perspective: 1000px;
            margin: auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 20px 50px rgba(238, 156, 167, 0.3), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 5px 10px rgba(214, 51, 132, 0.3));
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            color: var(--text-pink);
            margin-bottom: 10px;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px white;
        }
        
        .subtitle {
            color: #885a5f;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
            font-weight: 400;
        }
        
        .info-box {
            background: rgba(255, 240, 243, 0.6);
            border: 1px solid rgba(255, 141, 161, 0.3);
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .info-box::before {
            content: '✨';
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 20px;
            opacity: 0.5;
        }

        .info-box h3 {
            color: #ff4d6d;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 800;
        }
        
        .info-box p {
            color: #885a5f;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .captcha-container {
            margin: 20px auto;
            padding: 15px;
            background: rgba(255, 250, 240, 0.8);
            border-radius: 20px;
            border: 2px solid var(--pastel-pink);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            overflow: hidden;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 20px;
            display: none;
            font-weight: 700;
            font-size: 15px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .status.success {
            background: #fff0f5;
            color: var(--text-pink);
            border: 2px solid #ffc1cc;
            display: block;
            position: relative;
        }
        
        .status.success::after {
            content: '💖';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            animation: sparkle 1s infinite alternate;
        }

        @keyframes sparkle {
            from { transform: translateY(-50%) scale(1); opacity: 1; }
            to { transform: translateY(-50%) scale(1.3); opacity: 0.7; }
        }
        
        .status.error {
            background: #fff5f5;
            color: #d32f2f;
            border: 2px solid #ffcdd2;
            display: block;
        }
        
        .status.loading {
            background: #fffef0;
            color: #b8860b;
            border: 2px solid #ffeaa7;
            display: block;
        }
        
        .button {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #d63384;
            border: 2px solid white;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(238, 156, 167, 0.3);
            outline: none;
        }
        
        .button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(238, 156, 167, 0.5);
            background: linear-gradient(135deg, #ffb3b8 0%, #ffeff5 100%);
        }
        
        .button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            animation: pulse 2s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(238, 156, 167, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(238, 156, 167, 0); }
            100% { box-shadow: 0 0 0 0 rgba(238, 156, 167, 0); }
        }

        /* Anime Background Animations */
        .anime-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .sakura {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 100% 0 100% 0;
            opacity: 0.8;
            filter: blur(1px);
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.6;
            filter: blur(20px);
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { left: -200px; }
            to { left: 110vw; }
        }

        .river {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background: linear-gradient(to bottom, rgba(173, 216, 230, 0.5), rgba(255, 182, 193, 0.5));
            backdrop-filter: blur(5px);
            z-index: -1;
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            height: 2px;
            border-radius: 2px;
            animation: flow linear infinite;
        }

        @keyframes flow {
            from { transform: translateX(-100%); }
            to { transform: translateX(200%); }
        }

        
        .footer {
            margin-top: 30px;
            color: #a8888a;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="anime-bg">
        <div id="clouds-container"></div>
        <div id="sakura-container"></div>
        <div class="river" id="river"></div>
    </div>
    <div class="container">
        <div class="card">
            <div class="logo">🌸</div>
            <h1>ANYY CUTIE VERIFICATION</h1>
            
            <div class="captcha-container">
                <div id="cf-turnstile"></div>
            </div>

            <p class="subtitle">
                <strong>Verify you are human</strong>
            </p>
            
            <div class="info-box">
                <h3>Why verification is required:</h3>
                <p>• Prevents automated bot farming in games<br>
                   • Ensures fair gameplay for all users<br>
                   • Protects the game economy from inflation<br>
                   • Required only when unusual activity is detected</p>
            </div>
            
            <div id="status" class="status"></div>
            
            <div class="footer">
                Powered by Cloudflare Turnstile ✨
            </div>
        </div>
    </div>

    <script>
        // Cloudflare Turnstile Site Key
        const TURNSTILE_SITE_KEY = "0x4AAAAAADDxr03AHxX7zupM";
        
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Initialize Telegram WebApp
        tg.expand();
        tg.ready();
        
        let turnstileWidgetId = null;
        let isVerified = false;
        
        // Initialize Cloudflare Turnstile
        function initTurnstile() {
            console.log('Attempting to initialize Turnstile...');
            try {
                if (typeof turnstile === 'undefined') {
                    throw new Error('Turnstile SDK is not loaded yet');
                }
                
                turnstileWidgetId = turnstile.render('#cf-turnstile', {
                    sitekey: TURNSTILE_SITE_KEY,
                    callback: function(token) {
                        console.log('CAPTCHA solved');
                        onCaptchaSuccess(token);
                    },
                    'expired-callback': function() {
                        console.warn('CAPTCHA expired');
                        showStatus('Oopsie! CAPTCHA expired. Please try again, cutie! 🌸', 'error');
                        isVerified = false;
                    },
                    'error-callback': function() {
                        console.error('Turnstile error callback triggered');
                        showStatus('Oh no! CAPTCHA error. Please refresh the page! 🎀', 'error');
                    }
                });
                
                console.log('Turnstile rendered successfully.');
            } catch (error) {
                console.error('initTurnstile failed:', error);
                showStatus('CAPTCHA failed to load. Please refresh the page, sweetie! 🍬', 'error');
            }
        }

        // Initialize anime background
        function initAnimeBG() {
            const sakuraContainer = document.getElementById('sakura-container');
            const cloudsContainer = document.getElementById('clouds-container');
            const river = document.getElementById('river');

            // Create Sakura Petals
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'sakura';
                const size = Math.random() * 10 + 5 + 'px';
                petal.style.width = size;
                petal.style.height = size;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 5 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                petal.style.opacity = Math.random() * 0.5 + 0.3;
                sakuraContainer.appendChild(petal);
            }

            // Create Clouds
            for (let i = 0; i < 5; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                const w = Math.random() * 150 + 100 + 'px';
                const h = Math.random() * 50 + 40 + 'px';
                cloud.style.width = w;
                cloud.style.height = h;
                cloud.style.top = Math.random() * 40 + 'vh';
                cloud.style.animationDuration = Math.random() * 20 + 20 + 's';
                cloud.style.animationDelay = Math.random() * 20 + 's';
                cloudsContainer.appendChild(cloud);
            }

            // Create River Ripples
            for (let i = 0; i < 10; i++) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.width = Math.random() * 100 + 50 + 'px';
                ripple.style.top = Math.random() * 100 + '%';
                ripple.style.left = '0';
                ripple.style.animationDuration = Math.random() * 3 + 2 + 's';
                ripple.style.animationDelay = Math.random() * 3 + 's';
                river.appendChild(ripple);
            }
        }
        
        // Poll for Turnstile availability
        function pollTurnstile() {
            console.log('Polling for Turnstile SDK...');
            const interval = setInterval(() => {
                if (typeof turnstile !== 'undefined') {
                    console.log('Turnstile SDK found!');
                    clearInterval(interval);
                    initTurnstile();
                }
            }, 100);
            
            setTimeout(() => clearInterval(interval), 10000);
        }
        
        // Show status message
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
        
        // Handle CAPTCHA success
        function onCaptchaSuccess(token) {
            showStatus('You are really cutie human! ✨', 'success');
            isVerified = true;
            window.cfToken = token;
            
            // Auto-submit verification
            setTimeout(sendVerification, 1000);
        }
        
        // Send verification to bot
        async function sendVerification() {
            if (!isVerified || !window.cfToken) {
                showStatus('Please complete the CAPTCHA first.', 'error');
                return;
            }
            
            showStatus('Sending to bot... 🚀', 'loading');
            
            try {
                const verificationData = {
                    action: "verify",
                    cf_token: window.cfToken,
                    timestamp: Date.now(),
                    user_id: tg.initDataUnsafe.user?.id || 'unknown'
                };
                
                tg.sendData(JSON.stringify(verificationData));
                
                showStatus('✅ Verification sent successfully! You can close this window.', 'success');
                
                setTimeout(() => {
                    tg.close();
                }, 3000);
                
            } catch (error) {
                console.error('Verification error:', error);
                showStatus('Error sending verification. Please try again.', 'error');
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                showStatus('Error: This page must be opened in Telegram.', 'error');
                return;
            }
            
            initAnimeBG();
            pollTurnstile();
            
            setTimeout(() => {
                if (!turnstileWidgetId && typeof turnstile !== 'undefined') {
                    initTurnstile();
                }
            }, 5000);
        });
        
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && typeof turnstile !== 'undefined' && !turnstileWidgetId) {
                initTurnstile();
            }
        });
    </script>
</body>
</html>
